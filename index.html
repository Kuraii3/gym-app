<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Personal Gym Journal App</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* Apply the font and fix the layout */
      html, body { 
        height: 100%; 
        margin: 0; 
        font-family: 'Inter', sans-serif;
        background-color: #000000; /* Ensures background is solid black */
      } 
      
      #root { height: 100%; }

      /* This forces all text to be brighter if it's currently too dim */
      body {
        color: #f3f4f6; /* A very bright, slightly off-white (Gray 100) */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Help for dim descriptions: If Figma used 'opacity' for dim text, this overrides it */
      p, span, label {
        color: inherit;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
